<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Contact - Shriyanie Debi Tewari</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="css/main.css"/>
  <link rel="stylesheet" href="css/contact.css"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>

  <!-- NAVIGATIE -->
  <nav>
    <div class="nav-logo">Shriyanie Debi Tewari</div>
    <ul class="nav-links">
      <li><a href="index.html">Over mij</a></li>
      <li><a href="work.html">Projecten</a></li>
      <li><a href="contact.html" class="active">Contact</a></li>
    </ul>
  </nav>

  <!-- CONTACT -->
  <section id="contact">
    <div class="hero-bg"></div>
    <div class="contact-wrapper">
      <div class="contact-info fade-up">
        <div class="section-label">Contact</div>
        <h2 class="section-title">Laten we in gesprek gaan</h2>
        <div class="divider"></div>
        <p>Heb je een vraag of wil je samenwerken? Neem gerust contact met me op!</p>
        <div class="contact-links">
          <a href="https://mail.google.com/mail/?view=cm&to=254012@unasat.sr" target="_blank" class="contact-link">
            <div class="contact-link-icon">✉️</div>
            254012@unasat.sr
          </a>
          <a href="tel:+5978631031" class="contact-link">
            <div class="contact-link-icon">📞</div>
            +597 8631031
          </a>
          <a href="https://instagram.com/shriyanie07" target="_blank" class="contact-link">
            <div class="contact-link-icon"><i class="fa-brands fa-instagram"></i></div>
            shriyanie07
          </a>
          <a href="https://www.facebook.com/share/1Ca4bWKTp8/" target="_blank" class="contact-link">
            <div class="contact-link-icon"><i class="fa-brands fa-facebook"></i></div>
            Shriyanie Debi Tewari
          </a>
        </div>
      </div>

      <form class="contact-form fade-up fade-delay-1" id="contactForm">
        <div class="form-group">
          <label for="naam">Naam</label>
          <input type="text" id="naam" placeholder="Jouw naam" />
        </div>
        <div class="form-group">
          <label for="email">E-mail</label>
          <input type="email" id="email" placeholder="Jouw e-mail" />
        </div>
        <div class="form-group">
          <label for="bericht">Bericht</label>
          <textarea id="bericht" placeholder="Schrijf je bericht hier..."></textarea>
        </div>
        <button type="submit" class="form-submit">Stuur bericht</button>
      </form>
    </div>
  </section>

  <!-- FOOTER -->
  <footer>
    <p>© 2026 Shriyanie Debi Tewari · Building a better future</p>
  </footer>

  <script src="js/script.js"></script>
</body>
</html>
